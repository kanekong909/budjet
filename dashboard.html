<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1c1c1e">
  <title>ObraGastos — Mis Obras</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">🏗️</div>
    <div class="header-title" id="header-nombre">Cargando…</div>
    <button class="btn-icon" onclick="logout()" title="Cerrar sesión">👤</button>
  </header>

  <!-- Contenido principal -->
  <main class="main">
    <div class="row-between mb-8">
      <div class="section-title">Mis obras</div>
      <button class="btn btn-sm btn-secundario" onclick="abrirNuevaObra()">+ Nueva</button>
    </div>

    <div id="obras-lista" class="obras-grid">
      <div class="empty">
        <div class="empty-icon">⏳</div>
        <div class="empty-msg">Cargando obras…</div>
      </div>
    </div>
  </main>

  <!-- Nav inferior -->
  <nav class="nav-bottom">
    <button class="nav-btn active">
      <span class="icon">🏠</span>
      <span>Obras</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='perfil.html'">
      <span class="icon">
        <img src="./assets/icons/exit.svg" alt="Cerrar sesión" style="width:20px;height:20px;filter:invert(100%) sepia(100%) grayscale(100%) brightness(150%)">
      </span>
      <span>Perfil</span>
    </button>
  </nav>

  <!-- Sheet: Nueva obra -->
  <div class="overlay" id="overlay-obra">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="obra-sheet-title">Nueva obra</div>
      <form onsubmit="guardarObra(event)">
        <input type="hidden" id="obra-edit-id">
        <div class="field">
          <label>Nombre de la obra *</label>
          <input type="text" id="obra-nombre" placeholder="Ej: Casa Rodríguez, Bodega Norte…" required>
        </div>
        <div class="field">
          <label>Descripción</label>
          <textarea id="obra-desc" placeholder="Descripción opcional…" rows="2"></textarea>
        </div>
        <div class="field">
          <label>Ubicación</label>
          <input type="text" id="obra-ubicacion" placeholder="Ej: Calle 45 #23-10">
        </div>
        <div class="field">
          <label>Presupuesto total (COP)</label>
          <input type="number" id="obra-presupuesto" placeholder="0" min="0" step="1000">
        </div>
        <div class="row mt-16" style="gap:10px">
          <button type="button" class="btn btn-secundario w-full" onclick="cerrarSheet('overlay-obra')">Cancelar</button>
          <button type="submit" class="btn btn-primary w-full" id="btn-guardar-obra">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    if (!requireAuth()) void 0;

    const u = usuario();
    if (u) document.getElementById('header-nombre').textContent = u.nombre;

    let obras = [];

    async function cargarObras() {
      try {
        obras = await api.get('/api/obras');
        renderObras();
      } catch (err) {
        showToast('Error cargando obras', 'error');
        document.getElementById('obras-lista').innerHTML = `
          <div class="empty"><div class="empty-icon">⚠️</div>
          <div class="empty-msg">No se pudo conectar al servidor</div></div>`;
      }
    }

    function renderObras() {
      const container = document.getElementById('obras-lista');
      if (!obras.length) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🏗️</div>
            <div class="empty-msg">Aún no tienes obras.<br>¡Crea tu primera obra!</div>
          </div>`;
        return;
      }
      container.innerHTML = obras.map(o => `
        <div class="obra-list-item" onclick="abrirObra(${o.id})">
          <div class="obra-icon">🏗️</div>
          <div class="obra-info">
            <div class="obra-info-nombre">${o.nombre}</div>
            <div class="obra-info-meta">${o.ubicacion || 'Sin ubicación'} · ${o.total_gastos_count} gastos</div>
            <div class="obra-info-total">${formatMoney(o.total_gastado)}</div>
          </div>
          <div style="color:var(--texto-3);font-size:1.1rem">›</div>
        </div>
      `).join('');
    }

    function abrirObra(id) {
      const obra = obras.find(o => o.id === id);
      localStorage.setItem('og_obra', JSON.stringify(obra));
      window.location.href = 'obra.html';
    }

    function abrirNuevaObra() {
      document.getElementById('obra-sheet-title').textContent = 'Nueva obra';
      document.getElementById('obra-edit-id').value = '';
      document.getElementById('obra-nombre').value = '';
      document.getElementById('obra-desc').value = '';
      document.getElementById('obra-ubicacion').value = '';
      document.getElementById('obra-presupuesto').value = '';
      document.getElementById('overlay-obra').classList.add('open');
    }

    function cerrarSheet(id) {
      document.getElementById(id).classList.remove('open');
    }

    document.getElementById('overlay-obra').addEventListener('click', function(e) {
      if (e.target === this) cerrarSheet('overlay-obra');
    });

    async function guardarObra(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-guardar-obra');
      const editId = document.getElementById('obra-edit-id').value;
      setLoading(btn, true);
      try {
        const data = {
          nombre: document.getElementById('obra-nombre').value.trim(),
          descripcion: document.getElementById('obra-desc').value.trim(),
          ubicacion: document.getElementById('obra-ubicacion').value.trim(),
          presupuesto: parseFloat(document.getElementById('obra-presupuesto').value) || 0
        };
        if (editId) {
          await api.put(`/api/obras/${editId}`, data);
          showToast('Obra actualizada ✓');
        } else {
          await api.post('/api/obras', data);
          showToast('Obra creada ✓');
        }
        cerrarSheet('overlay-obra');
        await cargarObras();
      } catch (err) {
        showToast(err.message, 'error');
      }
      setLoading(btn, false);
    }

    cargarObras();
  </script>
</body>
</html>
